<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bueno Family Manager</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1a2332">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👨‍👩‍👧‍👧</text></svg>">
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --navy: #1a2332; --orange: #ff8c00; --green: #22c55e;
            --yellow: #eab308; --red: #ef4444; --grey: #64748b;
            --light: #f8fafc; --white: #fff; --border: #e2e8f0;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--light); color: var(--navy); min-height: 100vh; }

        .header { background: var(--navy); padding: 14px 20px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; }
        .header h1 { color: var(--white); font-size: 16px; }
        .header h1 span { color: var(--orange); }
        .user-select { display: flex; gap: 6px; }
        .user-btn { background: rgba(255,255,255,0.12); color: #fff; border: 2px solid transparent; padding: 5px 10px; border-radius: 16px; font-size: 11px; cursor: pointer; transition: 0.2s; }
        .user-btn.active { border-color: var(--orange); background: rgba(255,140,0,0.2); }

        .main { max-width: 800px; margin: 0 auto; padding: 16px 12px; }

        .summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
        .stat { background: var(--white); border-radius: 10px; padding: 14px; text-align: center; border: 1px solid var(--border); }
        .stat .num { font-size: 28px; font-weight: 700; }
        .stat .lbl { font-size: 10px; color: var(--grey); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
        .stat.r .num { color: var(--red); }
        .stat.y .num { color: var(--yellow); }
        .stat.g .num { color: var(--green); }

        .card { background: var(--white); border-radius: 10px; border: 1px solid var(--border); margin-bottom: 12px; overflow: hidden; }
        .card-head { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 14px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
        .card-head .badge { font-size: 11px; background: var(--light); padding: 2px 8px; border-radius: 8px; color: var(--grey); }

        .task { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 10px; }
        .task:last-child { border-bottom: none; }
        .dot { width: 9px; height: 9px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
        .dot.red { background: var(--red); } .dot.yellow { background: var(--yellow); } .dot.green { background: var(--green); } .dot.grey { background: #cbd5e1; }
        .task-body { flex: 1; }
        .task-title { font-size: 13px; font-weight: 500; }
        .task-meta { font-size: 11px; color: var(--grey); margin-top: 2px; }
        .task-tags { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
        .tag { font-size: 10px; padding: 2px 6px; border-radius: 6px; font-weight: 500; }
        .tag.dad { background: #dbeafe; color: #1d4ed8; }
        .tag.mom { background: #fce7f3; color: #be185d; }
        .tag.both { background: #f3e8ff; color: #7c3aed; }
        .tag.owner { background: #fff7ed; color: #c2410c; }

        .task-actions { display: flex; gap: 4px; flex-shrink: 0; }
        .btn { padding: 5px 10px; border-radius: 6px; font-size: 10px; font-weight: 500; border: none; cursor: pointer; }
        .btn-claim { background: #dbeafe; color: #1d4ed8; }
        .btn-done { background: #dcfce7; color: #166534; }
        .btn-claim:hover { background: #bfdbfe; } .btn-done:hover { background: #bbf7d0; }
        .claimed { font-size: 10px; color: var(--orange); font-weight: 500; }
        .completed .task-title { text-decoration: line-through; opacity: 0.5; }

        .add-bar { padding: 10px 16px; background: var(--light); display: flex; gap: 6px; flex-wrap: wrap; }
        .add-bar input { flex: 1; min-width: 200px; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; }
        .add-bar select { padding: 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; }
        .add-bar button { background: var(--orange); color: white; border: none; padding: 8px 14px; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; }

        .activity { padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 12px; color: var(--grey); }
        .activity:last-child { border-bottom: none; }
        .activity strong { color: var(--navy); }
        .activity .time { font-size: 10px; color: #94a3b8; }

        .tabs { display: flex; gap: 2px; padding: 0 16px; background: var(--white); border-bottom: 1px solid var(--border); overflow-x: auto; }
        .tab { padding: 10px 12px; font-size: 12px; font-weight: 500; color: var(--grey); border-bottom: 2px solid transparent; cursor: pointer; white-space: nowrap; }
        .tab.active { color: var(--orange); border-bottom-color: var(--orange); }

        .offline-banner { display: none; background: var(--red); color: white; text-align: center; padding: 6px; font-size: 11px; }
        .offline-banner.show { display: block; }

        .btn-text { background: #fef3c7; color: #92400e; }
        .btn-text:hover { background: #fde68a; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; }
        .modal-overlay.show { display: flex; }
        .modal { background: white; border-radius: 12px; padding: 24px; max-width: 400px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .modal h3 { font-size: 16px; margin-bottom: 12px; color: var(--navy); }
        .modal input, .modal textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; margin-bottom: 10px; font-family: inherit; }
        .modal textarea { height: 80px; resize: vertical; }
        .modal .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
        .modal .btn-send { background: var(--orange); color: white; padding: 8px 16px; border-radius: 6px; border: none; font-size: 13px; font-weight: 500; cursor: pointer; }
        .modal .btn-cancel { background: var(--light); color: var(--grey); padding: 8px 16px; border-radius: 6px; border: 1px solid var(--border); font-size: 13px; cursor: pointer; }
        .modal .btn-send:hover { background: #e07b00; }
        .modal .success-msg { background: #dcfce7; color: #166534; padding: 10px; border-radius: 6px; text-align: center; font-size: 13px; display: none; }

        .user-greeting { color: var(--orange); font-size: 11px; margin-top: 2px; text-align: right; }

        @media(max-width:500px) { .summary { grid-template-columns: repeat(3,1fr); } .task-actions { flex-direction: column; } .user-select { gap: 4px; } }
    </style>
</head>
<body>

<div class="offline-banner" id="offline">You're offline — changes will sync when connected</div>

<div class="header">
    <h1><span>●</span> Family Manager</h1>
    <div style="text-align:right;">
        <div class="user-select" id="user-btns"></div>
        <div class="user-greeting" id="user-greeting">Logged in as Maria</div>
    </div>
</div>

<!-- Text Message Modal -->
<div class="modal-overlay" id="text-modal">
    <div class="modal">
        <h3>📲 Send Text Reminder</h3>
        <label style="font-size:12px;color:var(--grey);margin-bottom:4px;display:block;">To:</label>
        <select id="text-to" style="width:100%;padding:10px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;margin-bottom:10px;">
            <option value="mom">Mom</option>
            <option value="dad">Dad</option>
            <option value="all-sisters">All Sisters</option>
            <option value="nini">Nini</option>
            <option value="isabel">Isabel</option>
            <option value="elena">Elena</option>
            <option value="marla">Marla</option>
        </select>
        <label style="font-size:12px;color:var(--grey);margin-bottom:4px;display:block;">Message:</label>
        <textarea id="text-msg" placeholder="Type your reminder message..."></textarea>
        <div class="success-msg" id="text-success">✓ Text sent successfully!</div>
        <div class="modal-btns">
            <button class="btn-cancel" onclick="closeTextModal()">Cancel</button>
            <button class="btn-send" onclick="sendText()">Send Text</button>
        </div>
    </div>
</div>

<div class="main">
    <div class="summary">
        <div class="stat r"><div class="num" id="s-overdue">0</div><div class="lbl">Overdue</div></div>
        <div class="stat y"><div class="num" id="s-upcoming">0</div><div class="lbl">Due Soon</div></div>
        <div class="stat g"><div class="num" id="s-done">0</div><div class="lbl">Done</div></div>
    </div>

    <div class="card">
        <div class="tabs" id="tabs">
            <div class="tab active" data-tab="all">All</div>
            <div class="tab" data-tab="mine">My Tasks</div>
            <div class="tab" data-tab="overdue">Overdue</div>
            <div class="tab" data-tab="mom">Mom</div>
            <div class="tab" data-tab="dad">Dad</div>
            <div class="tab" data-tab="done">Done</div>
        </div>
        <div id="task-list"></div>
        <div class="add-bar">
            <input type="text" id="new-task" placeholder="Add new item...">
            <select id="new-who"><option value="mom">Mom</option><option value="dad">Dad</option><option value="both">Both</option></select>
            <button onclick="addTask()">+ Add</button>
        </div>
    </div>

    <div class="card">
        <div class="card-head">Recent Activity <span class="badge" id="activity-count">0</span></div>
        <div id="activity-list"></div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDSxPMBFHjOFMJeMPO9Jg0wOJXOac27eJU",
    authDomain: "family-manager-a8aed.firebaseapp.com",
    databaseURL: "https://family-manager-a8aed-default-rtdb.firebaseio.com",
    projectId: "family-manager-a8aed",
    storageBucket: "family-manager-a8aed.firebasestorage.app",
    messagingSenderId: "389998444916",
    appId: "1:389998444916:web:f84b43798be130e92e2c21"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Family members
const FAMILY = ['Maria', 'Nini', 'Isabel', 'Elena', 'Marla'];
let currentUser = localStorage.getItem('fm-user') || 'Maria';
let currentTab = 'all';

// Initialize user buttons
function renderUserBtns() {
    const cont = document.getElementById('user-btns');
    cont.innerHTML = FAMILY.map(name =>
        `<div class="user-btn ${name === currentUser ? 'active' : ''}" onclick="setUser('${name}')">${name}</div>`
    ).join('');
    document.getElementById('user-greeting').textContent = `Logged in as ${currentUser}`;
}

function setUser(name) {
    currentUser = name;
    localStorage.setItem('fm-user', name);
    renderUserBtns();
    alert(`✓ You're now logged in as ${name}`);
}

// Text modal
let textTaskTitle = '';
function openTextModal(taskTitle) {
    textTaskTitle = taskTitle;
    document.getElementById('text-msg').value = `Reminder: ${taskTitle}`;
    document.getElementById('text-modal').classList.add('show');
    document.getElementById('text-success').style.display = 'none';
}
function closeTextModal() {
    document.getElementById('text-modal').classList.remove('show');
}
function sendText() {
    const to = document.getElementById('text-to').value;
    const msg = document.getElementById('text-msg').value;
    // Log the text intent to Firebase (will connect to Twilio later)
    db.ref('texts').push({
        to: to,
        message: msg,
        sentBy: currentUser,
        task: textTaskTitle,
        time: Date.now(),
        status: 'queued'
    });
    addActivity(`${currentUser} sent text to ${to}: "${textTaskTitle}"`);
    document.getElementById('text-success').style.display = 'block';
    setTimeout(() => { closeTextModal(); }, 1500);
}

// Load initial data or seed
function seedData() {
    const tasks = [
        { title: "Mom — Derm (Lifschitz) needs appt", who: "mom", responsible: "Elena", urgency: "red", action: "Schedule yearly skin check", created: Date.now() },
        { title: "Dad — BCC face needs Mohs surgery", who: "dad", responsible: "Elena", urgency: "red", action: "Dr Fayne suggests Dr Lara Kelly", created: Date.now() },
        { title: "Dad — Cardio (Sagar) needs yearly appt", who: "dad", responsible: "Maria", urgency: "red", action: "Last visit Jan 2025 — overdue", created: Date.now() },
        { title: "Mom — Psych for ADHD — waiting on neuro rec", who: "mom", responsible: "Elena", urgency: "yellow", action: "Follow up on emessage", created: Date.now() },
        { title: "Mom — GI (Subhani) — when next visit?", who: "mom", responsible: "Elena", urgency: "yellow", action: "Reached out, pending", created: Date.now() },
        { title: "Mom — Infusion center closer to mall", who: "mom", responsible: "Marla", urgency: "yellow", action: "Research options", created: Date.now() },
        { title: "Dad — Ophtho (Camejo) frequency?", who: "dad", responsible: "Nini", urgency: "yellow", action: "Reached out, pending", created: Date.now() },
        { title: "Dad — Atorvastatin on hold, needs statin", who: "dad", responsible: "Isabel", urgency: "yellow", action: "Discuss at next PCP", created: Date.now() },
        { title: "Mom — IVIg infusion (every 3 weeks)", who: "mom", responsible: "Marla", urgency: "green", action: "Recurring — FlowMed", created: Date.now() },
        { title: "Dad — Ortho (Gorman) next: Jul 9", who: "dad", responsible: "Isabel", urgency: "green", action: "Scheduled", created: Date.now() },
        { title: "Mom — Neuro (Carbunar) next: Jul 29", who: "mom", responsible: "Nini", urgency: "green", action: "Scheduled", created: Date.now() },
    ];
    tasks.forEach(t => db.ref('tasks').push(t));
    db.ref('seeded').set(true);
}

// Render tasks
function renderTasks(snapshot) {
    const list = document.getElementById('task-list');
    let html = '';
    let overdue = 0, upcoming = 0, done = 0;
    const tasks = [];

    snapshot.forEach(child => {
        tasks.push({ id: child.key, ...child.val() });
    });

    // Sort: red first, then yellow, then green, then done
    const order = { red: 0, yellow: 1, green: 2, grey: 3 };
    tasks.sort((a, b) => (order[a.urgency] || 3) - (order[b.urgency] || 3));

    tasks.forEach(t => {
        if (t.done) { done++; }
        else if (t.urgency === 'red') overdue++;
        else if (t.urgency === 'yellow') upcoming++;

        // Filter by tab
        if (currentTab === 'mine' && t.responsible !== currentUser && t.claimedBy !== currentUser) return;
        if (currentTab === 'mine' && t.done) return;
        if (currentTab === 'overdue' && t.urgency !== 'red') return;
        if (currentTab === 'mom' && t.who !== 'mom' && t.who !== 'both') return;
        if (currentTab === 'dad' && t.who !== 'dad' && t.who !== 'both') return;
        if (currentTab === 'done' && !t.done) return;
        if (currentTab !== 'done' && currentTab !== 'mine' && t.done) return;

        const whoTag = `<span class="tag ${t.who}">${t.who === 'both' ? 'Both' : t.who === 'mom' ? 'Mom' : 'Dad'}</span>`;
        const ownerTag = t.responsible ? `<span class="tag owner">${t.responsible}</span>` : '';
        const claimedHtml = t.claimedBy ? `<span class="claimed">✓ ${t.claimedBy}</span>` :
            `<button class="btn btn-claim" onclick="claim('${t.id}')">I'll handle</button>`;
        const doneBtn = t.done ? '' : `<button class="btn btn-done" onclick="markDone('${t.id}')">Done</button>`;
        const textBtn = t.done ? '' : `<button class="btn btn-text" onclick="openTextModal('${t.title.replace(/'/g, "\\'")}')">📲 Text</button>`;

        html += `<div class="task ${t.done ? 'completed' : ''}">
            <div class="dot ${t.done ? 'grey' : t.urgency}"></div>
            <div class="task-body">
                <div class="task-title">${t.title}</div>
                <div class="task-meta">${t.action || ''}</div>
                <div class="task-tags">${whoTag}${ownerTag}</div>
            </div>
            <div class="task-actions">${claimedHtml}${doneBtn}${textBtn}</div>
        </div>`;
    });

    list.innerHTML = html || '<div style="padding:20px;text-align:center;color:#94a3b8;">No items in this view</div>';
    document.getElementById('s-overdue').textContent = overdue;
    document.getElementById('s-upcoming').textContent = upcoming;
    document.getElementById('s-done').textContent = done;
}

// Actions
function claim(id) {
    db.ref(`tasks/${id}/claimedBy`).set(currentUser);
    addActivity(`${currentUser} claimed a task`);
}

function markDone(id) {
    db.ref(`tasks/${id}`).update({ done: true, doneBy: currentUser, doneAt: Date.now(), urgency: 'grey' });
    addActivity(`${currentUser} marked a task done`);
}

function addTask() {
    const input = document.getElementById('new-task');
    const who = document.getElementById('new-who').value;
    if (!input.value.trim()) return;
    db.ref('tasks').push({
        title: input.value.trim(),
        who: who,
        responsible: currentUser,
        urgency: 'yellow',
        action: '',
        created: Date.now(),
        done: false
    });
    addActivity(`${currentUser} added: ${input.value.trim()}`);
    input.value = '';
}

function addActivity(text) {
    db.ref('activity').push({ text, time: Date.now(), user: currentUser });
}

// Render activity
function renderActivity(snapshot) {
    const list = document.getElementById('activity-list');
    const items = [];
    snapshot.forEach(child => items.push(child.val()));
    items.sort((a, b) => b.time - a.time);
    const recent = items.slice(0, 10);
    document.getElementById('activity-count').textContent = recent.length;
    list.innerHTML = recent.map(a => {
        const ago = timeAgo(a.time);
        return `<div class="activity"><strong>${a.user}</strong> ${a.text.replace(a.user + ' ', '')} <span class="time">${ago}</span></div>`;
    }).join('');
}

function timeAgo(ts) {
    const diff = Date.now() - ts;
    if (diff < 60000) return 'just now';
    if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
    if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
    return Math.floor(diff/86400000) + 'd ago';
}

// Tabs
document.getElementById('tabs').addEventListener('click', e => {
    if (e.target.classList.contains('tab')) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        e.target.classList.add('active');
        currentTab = e.target.dataset.tab;
        db.ref('tasks').once('value').then(renderTasks);
    }
});

// Enter key
document.getElementById('new-task').addEventListener('keypress', e => { if (e.key === 'Enter') addTask(); });

// Offline detection
window.addEventListener('offline', () => document.getElementById('offline').classList.add('show'));
window.addEventListener('online', () => document.getElementById('offline').classList.remove('show'));

// Initialize
renderUserBtns();

// Listen for real-time changes
db.ref('seeded').once('value').then(snap => {
    if (!snap.val()) seedData();
});
db.ref('tasks').on('value', renderTasks);
db.ref('activity').on('value', renderActivity);
</script>

</body>
</html>
