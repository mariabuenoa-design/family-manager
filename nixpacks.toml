 [phases.setup]
  nixPkgs = ["chromium"]
  aptPkgs = ["libnss3", "libatk1.0-0", "libatk-bridge2.0-0", "libcups2", "libdrm2", "libxkbcommon0", "libxcomposite1",
  "libxdamage1", "libxfixes3", "libxrandr2", "libgbm1", "libpango-1.0-0", "libcairo2", "libasound2", "libglib2.0-0"]

  [phases.install]
  cmds = ["npm ci"]

  [environment]
  PUPPETEER_SKIP_DOWNLOAD = "true"

  [start]
  cmd = "node agent/group-agent.mjs"
